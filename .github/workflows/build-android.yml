name: Build Android Debug (APK)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Decode Firebase config
        env:
          GOOGLE_SERVICES_JSON_B64: ${{ secrets.ANDROID_GOOGLE_SERVICES_JSON_B64 }}
        run: |
          if [ -z "$GOOGLE_SERVICES_JSON_B64" ]; then
            echo "Missing secret: ANDROID_GOOGLE_SERVICES_JSON_B64"
            exit 1
          fi
          printf '%s' "$GOOGLE_SERVICES_JSON_B64" | base64 -d > verso/android/app/google-services.json

      - name: Set up Flutter (stable)
        uses: subosito/flutter-action@v3
        with:
          channel: stable
          cache: true

      - name: Get dependencies
        working-directory: verso
        run: flutter pub get

      - name: Run codegen
        working-directory: verso
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Analyze code
        working-directory: verso
        run: flutter analyze

      - name: Build release APK
        working-directory: verso
        run: |
          flutter build apk --release \
            --dart-define=API_URL=https://verso-zjri.onrender.com \
            --dart-define=PUSHER_KEY=${{ secrets.PUSHER_KEY }} \
            --dart-define=PUSHER_CLUSTER=ap2 \
            --dart-define=SENTRY_DSN=${{ secrets.SENTRY_DSN }} \
            --dart-define=POSTHOG_KEY=${{ secrets.POSTHOG_KEY }}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-apk-${{ github.sha }}
          path: verso/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
